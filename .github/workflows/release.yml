name: Release

# Trigger by pushing a version tag, e.g.:
#   npm version patch --no-git-tag-version
#   git commit -am "v1.2.3" && git push
#   git tag v1.2.3 && git push origin v1.2.3
on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write   # create the GitHub Release + upload assets
      packages: write   # publish to GitHub Packages
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Ensure release exists (avoids electron-builder create race)
        # electron-builder uploads multiple artifacts in parallel; each one
        # does check-then-create on the release, which can race and 422 with
        # "already_exists". Pre-creating the release means every uploader
        # finds it already there and just uploads.
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ github.ref_name }}"
          gh release view $tag --repo "${{ github.repository }}" 2>$null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag --repo "${{ github.repository }}" --title $tag --notes "Release $tag"
          }

      - name: Build and publish to GitHub Releases
        # electron-builder reads the "publish" config in package.json,
        # creates the release for this tag, and uploads the installer,
        # portable exe, latest.yml and blockmaps (latest.yml is what
        # makes auto-update work).
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --win --x64 --publish always

      - name: Label release assets (Installer / Portable)
        # electron-builder uploads assets without display labels; add the
        # "(Installer)" / "(Portable)" suffixes shown on the Releases page.
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $repo = "${{ github.repository }}"
          $tag  = "${{ github.ref_name }}"
          $assets = gh api "repos/$repo/releases/tags/$tag" --jq '.assets' | ConvertFrom-Json
          foreach ($a in $assets) {
            if ($a.name -like "*.blockmap" -or $a.name -eq "latest.yml") { continue }
            if ($a.name -like "*Setup*.exe") {
              gh api -X PATCH "repos/$repo/releases/assets/$($a.id)" -f label="$($a.name) (Installer)"
            } elseif ($a.name -like "*.exe") {
              gh api -X PATCH "repos/$repo/releases/assets/$($a.id)" -f label="$($a.name) (Portable)"
            }
          }

      # Configure auth for GitHub Packages only now, so the scoped
      # registry can't interfere with the public-registry npm ci above.
      - name: Set up Node.js for GitHub Packages
        uses: actions/setup-node@v6
        with:
          node-version: 20
          registry-url: 'https://npm.pkg.github.com'
          scope: '@georgeal78'

      - name: Publish to GitHub Packages
        # Best-effort: a packages failure shouldn't fail the release.
        continue-on-error: true
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm publish
